name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    # Temporary: Hetzner self-hosted runner offline (jobs stuck queued). Revert to
    # [self-hosted, erp-labs, hetzner] when erp-labs-hetzner-01 is healthy again.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run extract
      - run: npm run batch:import-existing
        continue-on-error: true
      - run: npm run batch:seed-missing
      - run: npm run verify
