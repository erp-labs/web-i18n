name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: [self-hosted, erp-labs, hetzner]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run extract
      - run: npm run batch:import-existing
        continue-on-error: true
      - run: npm run batch:seed-missing
      - run: npm run verify
