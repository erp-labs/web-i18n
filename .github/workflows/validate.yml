name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    # Self-hosted erp-labs-hetzner offline / queued — use ubuntu-latest until runner is healthy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run extract
      - run: npm run batch:import-existing
        continue-on-error: true
      - run: npm run batch:seed-missing
      - run: npm run verify
